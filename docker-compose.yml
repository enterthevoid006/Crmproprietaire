version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: crm_proprietaire_db
    environment:
      POSTGRES_USER: crm_owner
      POSTGRES_PASSWORD: secure_password_123
      POSTGRES_DB: crm_proprietaire
    ports:
      - "5433:5432"
    volumes:
      - crm_db_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U crm_owner -d crm_proprietaire" ]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    restart: always
    ports:
      - "8081:8080"

volumes:
  crm_db_data:
